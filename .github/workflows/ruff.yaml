name: Ruff

on:
  pull_request:
  push:

jobs:
  ruff:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install Ruff with pyproject.toml
        uses: astral-sh/ruff-action@v4.0.0
        with:
          version-file: "pyproject.toml"
          args: "--version"

      - name: Run Ruff check
        run: ruff check

      - name: Check Ruff formatting
        if: always()
        run: ruff format --check --diff

