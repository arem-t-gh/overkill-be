name: Pytest

on:
  pull_request:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    # Backs the integration/e2e tests, which hit a real Postgres database
    # rather than mocking the DB layer (see tests/conftest.py::db_session).
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_DB_URI: "postgresql+asyncpg://postgres:postgres@localhost:5432/overkillbe_test"

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.26"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run tests
        run: uv run pytest