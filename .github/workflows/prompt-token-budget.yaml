name: Prompt Token Budget

on:
  pull_request:
    paths:
      - "CLAUDE.md"
      - ".claude/prompts/**"
      - ".claude/commands/**"
      - ".claude/agents/**"
      - ".github/prompt-budget.yaml"
      - ".github/scripts/check_prompt_budget.py"

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.26"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Check prompt token budget
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: >-
          uv run poe check-prompt-budget
          --base-ref "${{ github.event.pull_request.base.sha }}"
