name: Manage superuser

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to run against"
        type: choice
        options:
          # TODO: should only be dev/stage/prod
          - overkill-be / dev
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - create-user-record
          - delete-user-record
      external_auth_id:
        description: "ID from auth provider"
        required: true

run-name: "Manage superuser: ${{ github.event.inputs.action }}"

jobs:
  manage-superuser:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    if: github.ref == 'refs/heads/main'  # run in main only

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b
        with:
          version: "0.11.26"

      - name: Install dependencies
        run: uv sync --frozen --dev

      - name: Run CLI
        env:
          DB_URI: ${{ secrets.DB_URI }}
        run: uv run poe manage-superuser ${{ github.event.inputs.action }} ${{ github.event.inputs.external_auth_id }}
        